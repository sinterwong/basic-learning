name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:24.04

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: apt-get update && apt-get install -y build-essential cmake ninja-build pkg-config

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Conan
        run: |
          python -m pip install --upgrade --user conan
          echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Cache Conan packages
        uses: actions/cache@v3
        with:
          path: ~/.conan
          key: conan-${{ runner.os }}-v1-${{ hashFiles('**/conanfile.*') }}
          restore-keys: |
            conan-${{ runner.os }}-v1-${{ hashFiles('**/conanfile.*') }}-
            conan-${{ runner.os }}-v1-

      - name: Configure with Conan and CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_INSTALL_PREFIX=install -G Ninja -DCMAKE_POLICY_DEFAULT_CMP0091=NEW

      - name: Build
        run: cmake --build build

      - name: Install
        working-directory: build
        run: cmake --install .

    strategy:
      matrix:
        build_type: [Release, Debug]
